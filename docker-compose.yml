services:
  # MongoDB Service
  mongodb:
    image: mongo:latest
    container_name: lanka-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Spring Boot Backend
  backend:
    build: ./backend
    container_name: lanka-backend
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    environment:
      # Use standard Spring Boot environment variable (overrides application.properties)
      - SPRING_DATA_MONGODB_URI=${MONGO_URI}
      - SPRING_SECURITY_USER_NAME=admin
      - SPRING_SECURITY_USER_PASSWORD=${JWT_SECRET} # Just to suppress the random warning
      - SYSTEM_NAME=Lanka Agri Direct
      # Inject Secrets from .env
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}

  # Admin Web Dashboard
  admin-web:
    build: ./admin-web
    container_name: lanka-admin-web
    restart: on-failure
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
