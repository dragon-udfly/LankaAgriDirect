services:
  # MongoDB Service
  mongodb:
    image: mongo:latest
    container_name: lanka-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      # Seed script: runs once on first-time DB creation
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Spring Boot Backend
  backend:
    build: ./backend
    container_name: lanka-backend
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      # Use Spring Boot canonical env var name — maps directly to spring.data.mongodb.uri
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/lankaagridirect_db
      # Inject Secrets from .env
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}

  # Admin Web Dashboard
  admin-web:
    build: ./admin-web
    container_name: lanka-admin-web
    restart: on-failure
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
