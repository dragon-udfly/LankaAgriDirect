spring.application.name=LankaAgriDirect

# =====================
# MongoDB Configuration
# =====================
spring.data.mongodb.uri=mongodb://localhost:27017/lankaagridirect_db

# =====================
# JWT Configuration
# =====================
# IMPORTANT: Replace with a strong, random 256-bit Base64-encoded secret before production
jwt.secret=YOUR_VERY_LONG_AND_SECURE_BASE64_ENCODED_SECRET_KEY_REPLACE_ME
jwt.expiration-ms=604800000

# =====================
# Cloudinary Configuration
# =====================
# IMPORTANT: Replace with your actual Cloudinary credentials from https://console.cloudinary.com
cloudinary.cloud-name=YOUR_CLOUDINARY_CLOUD_NAME
cloudinary.api-key=YOUR_CLOUDINARY_API_KEY
cloudinary.api-secret=YOUR_CLOUDINARY_API_SECRET

# =====================
# Server Configuration
# =====================
server.port=8080

# =====================
# CORS (Dev - update for production)
# =====================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173