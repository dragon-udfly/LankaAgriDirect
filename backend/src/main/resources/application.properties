spring.application.name=LankaAgriDirect

# =====================
# MongoDB Configuration
# =====================
spring.data.mongodb.uri=mongodb://mongodb:27017/lankaagridirect_db
spring.data.mongodb.host=mongodb
spring.data.mongodb.port=27017
spring.data.mongodb.database=lankaagridirect_db
spring.mongodb.uri=mongodb://mongodb:27017/lankaagridirect_db

# =====================
# JWT Configuration
# =====================
# IMPORTANT: Replace with a strong, random 256-bit Base64-encoded secret before production
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=604800000

# =====================
# Cloudinary Configuration
# =====================
# IMPORTANT: Replace with your actual Cloudinary credentials from https://console.cloudinary.com
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# =====================
# Server Configuration
# =====================
server.port=8080
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =====================
# CORS (Dev - update for production)
# =====================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:8081,http://127.0.0.1:5173,http://127.0.0.1:3000,http://127.0.0.1:8081